version: "3.9"
name: "q4-video"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper_q4
    networks:
      - app-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    healthcheck:
      test: echo srvr | nc zookeeper 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka_q4
    networks:
      - app-net
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: kafka-topics --bootstrap-server ${KAFKA_BOOTSTRAP_SERVERS} --list || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: redis_q4
    ports:
      - "6379:6379"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_q4
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres_q4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5431:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui_q4
    ports:
      - "9909:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - app-net
    depends_on:
      - kafka

  moderation_worker:
    build:
      context: ./moderation_worker
      dockerfile: Dockerfile
    deploy:
      replicas: 2
    restart: unless-stopped
    depends_on:
      - kafka
      - rabbitmq
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - app-net

  vod_transcoding_worker:
    build:
      context: ./vod_transcoding_worker
      dockerfile: Dockerfile
    deploy:
      replicas: 2
    restart: unless-stopped
    depends_on:
      - kafka
      - rabbitmq
    networks:
      - app-net
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      # Topics
      TRANSCODING_UPDATE_TOPIC: ${TRANSCODING_UPDATE_TOPIC}
      TRANSCODING_FINISH_TOPIC: ${TRANSCODING_FINISH_TOPIC}
      TRANSCODING_FAIL_TOPIC: ${TRANSCODING_FAIL_TOPIC}

      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_RAW_BUCKET: ${AWS_RAW_BUCKET}
      AWS_TRANSCODED_BUCKET: ${AWS_TRANSCODED_BUCKET}

      # CDN
      CDN_BASE_URL: ${CDN_BASE_URL}

      # Key service
      PUBLIC_KEY_SERVER_URL: ${PUBLIC_KEY_SERVER_URL}

      # RabbitMQ
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: transcoding_jobs
      # Worker tuning
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS}

  service_discovery:
    container_name: service-discovery
    build:
      context: ./ServiceDiscovery
      dockerfile: ./Dockerfile
    depends_on:
      - kafka
      - rabbitmq
      - redis
      - postgres
    networks:
      - app-net

  api_gateway:
    container_name: api-gateway
    ports:
      - "8001:8001"
    build:
      context: ./api_gateway
      dockerfile: ./Dockerfile
    deploy:
      replicas: 1
    depends_on:
      - service_discovery
    networks:
      - app-net
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka

  asset_onboarding:
    build:
      context: ./
      dockerfile: ./asset_onboarding/Dockerfile
    deploy:
      replicas: 2
    depends_on:
      - service_discovery
      - api_gateway
    environment:
      DB_URL : jdbc:postgresql://postgres_q4:5432/vsnt_assets
      DB_USERNAME : postgres
      DB_PASSWORD: password
      EUREKA_URL:  http://service-discovery:8761/eureka
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      TRANSCODING_QUEUE_NAME: transcoding_jobs
      MODERATION_QUEUE_NAME: moderation_jobs
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_RAW_BUCKET}
      AWS_SECURE_BUCKET: ${AWS_TRANSCODED_BUCKET}
      KAFKA_BOOTSTRAP_SERVERS : ${KAFKA_BOOTSTRAP_SERVERS}
      CDN_RESOURCE_URL : ${CDN_BASE_URL}/

    networks:
      - app-net
  notification_service:
    container_name: notification-service
    build:
      context: ./
      dockerfile: ./notification/Dockerfile
    networks:
      - app-net
    environment:
      DB_URL: jdbc:postgresql://postgres_q4:5432/vsnt_notifications
      DB_USERNAME: postgres
      DB_PASSWORD: password
      EUREKA_URL: http://service-discovery:8761/eureka
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}


  user:
    build:
      context: ./user
      dockerfile: ./Dockerfile
    networks:
      - app-net
    depends_on:
      - api_gateway
      - service_discovery
    environment:
      DB_URL: jdbc:postgresql://postgres_q4:5432/vsnt_users
      DB_USERNAME: postgres
      DB_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:  http://service-discovery:8761/eureka

  rtmp_server:
   container_name: rtmp-server
   ports:
     - "1935:1935"
   build:
    context: ./rtmp_server
    dockerfile: ./Dockerfile
   volumes:
    - /var/run/docker.sock:/var/run/docker.sock
   networks:
     - app-net
   environment:
     AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
     AWS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
     AWS_REGION: ${AWS_REGION}
     AWS_BUCKET_NAME: ${AWS_RAW_BUCKET}
     AWS_TRANSCODED_BUCKET_NAME: ${AWS_TRANSCODED_BUCKET}
     RABBITMQ_HOST: ${RABBITMQ_HOST}
     RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
     RABBITMQ_PORT: ${RABBITMQ_PORT}
     RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
     KAKFA_BROKERS: ${KAFKA_BOOTSTRAP_SERVERS}
     CLOUD_FRONT_URL: ${CDN_BASE_URL}
     SERVER_URL: rtmp://rtmp-server:1935
     KEY_SERVER_URL: http://api-gateway:8081/api/v1/key
     LIVE_SERVER_URL: http://api-gateway:8001/api/asset_onboarding/v1/live

networks:
  app-net:
    driver: bridge

volumes:
  pg_data: {}