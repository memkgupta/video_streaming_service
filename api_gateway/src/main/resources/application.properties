# Eureka Config
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true

# Application
spring.application.name=api_gateway

# Gateway config
spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.routes[0].id=user
spring.cloud.gateway.routes[0].uri=lb://user
#spring.cloud.gateway.routes[0].filters[0]=ApiResponseTransformFilter
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/user/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[1].id=asset_onboarding
spring.cloud.gateway.routes[1].uri=lb://asset-onboarding
#spring.cloud.gateway.routes[1].filters[0]=ApiResponseTransformFilter
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/asset_onboarding/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/asset_onboarding/**

#spring.cloud.gateway.routes[2].id=transcoder
#spring.cloud.gateway.routes[2].uri=lb://transcoder
#spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/transcoder/(?<segment>.*), /$\{segment}
#spring.cloud.gateway.routes[2].predicates[0]=Path=/api/transcoder/**
#

#spring.cloud.gateway.routes[5].id=aggregator_service
#spring.cloud.gateway.routes[5].uri=lb://aggregator-service
#spring.cloud.gateway.routes[5].filters[0]=APIKeyAuthenticationFilter
#spring.cloud.gateway.routes[5].filters[1]=ApiResponseTransformFilter
#spring.cloud.gateway.routes[5].filters[2]=RewritePath=/api/aggregate/(?<segment>.*), /$\{segment}
#spring.cloud.gateway.routes[5].predicates[0]=Path=/api/aggregate/**

# Port
server.port=8001

# SpringDoc Swagger UI (IMPORTANT: Path is NOT /swagger-ui.html anymore by default)
# Disable gateway docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].name=user
springdoc.swagger-ui.urls[0].url=/api/user/v3/api-docs

springdoc.swagger-ui.urls[1].name=asset-onboarding
springdoc.swagger-ui.urls[1].url=/api/asset_onboarding/v3/api-docs
